# Все тайминги — диапазоны [min, max]; значение выбирается случайно при исполнении.

browser_research:
  search_results_view_sec: [5, 10]
  page_load_timeout_sec: [15, 30]
  page_dwell_sec: [60, 120]
  scroll_interval_sec: [8, 20]
  scroll_count: [3, 8]
  capture_interval_sec: [12, 25]
  between_actions_pause_ms: [500, 2000]

warmup_profiles:
  tiktok_daily:
    pre_publish:
      mode: recommendations_feed
      duration_sec: [300, 600]
      likes_max: [0, 2]
      saves: forbidden
      comments_max: 0
    post_publish:
      duration_sec: [300, 600]
      likes_max: [1, 3]
      saves: forbidden
      comments_max: 0

warmup_feed:
  scroll_interval_sec: [3, 12]
  view_duration_sec: [5, 25]
  like_probability: [0.05, 0.12]
  like_cooldown_sec: [30, 90]
  comment_probability: [0, 0.02]
  comment_cooldown_sec: [120, 300]
  swipe_pause_ms: [800, 2500]

publish:
  hashtags_count: [3, 7]

constraints:
  saves_forbidden: true
  no_account_switch_within_min: 15
